<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kloudio Solitaire - A unique two-deck solitaire card game with a cross-shaped layout.">
    <title>Kloudio Solitaire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Toolbar -->
        <div id="toolbar">
            <button id="btn-undo" class="toolbar-btn" disabled>
                <span class="btn-icon">↩</span>
                <span class="btn-label">Undo</span>
            </button>
            <button id="btn-redo" class="toolbar-btn" disabled>
                <span class="btn-icon">↪</span>
                <span class="btn-label">Redo</span>
            </button>
            <button id="btn-hint" class="toolbar-btn hint-btn">
                <span class="btn-icon">💡</span>
                <span class="btn-label">Hint</span>
            </button>
            <div id="phase-display">Phase: 1/4</div>
            <button id="btn-new" class="toolbar-btn new-btn">
                <span class="btn-icon">🔄</span>
                <span class="btn-label">New Game</span>
            </button>
        </div>

        <!-- Game Board -->
        <div id="board">
            <!-- Row 1: King NW, North Tableau/Reserve, King NE -->
            <div class="board-cell" id="cell-nw">
                <div class="pile foundation-pile king-pile" id="king-0" data-pile="king-0" data-label="K"></div>
            </div>
            <div class="board-cell" id="cell-n">
                <div class="pile reserve-pile" id="reserve-0" data-pile="reserve-0"></div>
                <div class="pile tableau-pile" id="tableau-0" data-pile="tableau-0"></div>
            </div>
            <div class="board-cell" id="cell-ne">
                <div class="pile foundation-pile king-pile" id="king-1" data-pile="king-1" data-label="K"></div>
            </div>

            <!-- Row 2: West Tableau/Reserve, Ace Center, East Tableau/Reserve -->
            <div class="board-cell" id="cell-w">
                <div class="pile reserve-pile" id="reserve-2" data-pile="reserve-2"></div>
                <div class="pile tableau-pile" id="tableau-2" data-pile="tableau-2"></div>
            </div>
            <div class="board-cell" id="cell-center">
                <div class="pile foundation-pile ace-pile" id="ace-foundation" data-pile="ace-foundation" data-label="A"></div>
            </div>
            <div class="board-cell" id="cell-e">
                <div class="pile reserve-pile" id="reserve-3" data-pile="reserve-3"></div>
                <div class="pile tableau-pile" id="tableau-3" data-pile="tableau-3"></div>
            </div>

            <!-- Row 3: King SW, South Tableau/Reserve, King SE -->
            <div class="board-cell" id="cell-sw">
                <div class="pile foundation-pile king-pile" id="king-2" data-pile="king-2" data-label="K"></div>
            </div>
            <div class="board-cell" id="cell-s">
                <div class="pile reserve-pile" id="reserve-1" data-pile="reserve-1"></div>
                <div class="pile tableau-pile" id="tableau-1" data-pile="tableau-1"></div>
            </div>
            <div class="board-cell" id="cell-se">
                <div class="pile foundation-pile king-pile" id="king-3" data-pile="king-3" data-label="K"></div>
            </div>
        </div>

        <!-- Stockpile Area -->
        <div id="stock-area">
            <div class="pile" id="stockpile" data-pile="stockpile"></div>
            <div id="temp-stacks-container"></div>
        </div>

        <!-- Overlays -->
        <div id="overlay-win" class="overlay hidden">
            <div class="overlay-content">
                <h1>🎉 You Won! 🎉</h1>
                <p id="win-stats"></p>
                <button class="overlay-btn" onclick="game.startNewGame(); renderAll();">New Game</button>
            </div>
        </div>

        <div id="overlay-gameover" class="overlay hidden">
            <div class="overlay-content">
                <h1>😔 No More Moves</h1>
                <p>The game is stuck. Try undoing some moves or start a new game.</p>
                <div class="overlay-buttons">
                    <button class="overlay-btn secondary" id="gameover-undo">Undo</button>
                    <button class="overlay-btn" onclick="game.startNewGame(); renderAll();">New Game</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Drag ghost element -->
    <div id="drag-ghost" class="hidden"></div>

    <script src="game.js"></script>
</body>
</html>
